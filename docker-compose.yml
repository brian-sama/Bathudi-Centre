services:
  bathudi_db:
    image: postgres:15-alpine
    container_name: bathudi_db
    restart: always
    environment:
      POSTGRES_DB: bathudi
      POSTGRES_USER: ${DB_USER:-bathudi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5434:5432"
    volumes:
      - bathudi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bathudi_user} -d bathudi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bathudi_network

  bathudi_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bathudi_api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bathudi_user}:${DB_PASSWORD:-change-me}@bathudi_db:5432/bathudi
    env_file:
      - .env.production
    ports:
      - "8002:8000"
    volumes:
      - bathudi_static:/app/staticfiles
      - bathudi_media:/app/media
      - ./backend/pdfs:/app/pdfs:ro
    depends_on:
      bathudi_db:
        condition: service_healthy
    networks:
      - bathudi_network

  bathudi_web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: bathudi_web
    restart: always
    ports:
      - "8001:80"
    depends_on:
      - bathudi_api
    networks:
      - bathudi_network

networks:
  bathudi_network:
    name: bathudi_network
    driver: bridge

volumes:
  bathudi_postgres_data:
  bathudi_static:
  bathudi_media:
