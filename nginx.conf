server {
    listen 80;
    server_name bathudi.co.za www.bathudi.co.za;
    client_max_body_size 100M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://bathudi_api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Admin requests to the backend
    location /admin/ {
        proxy_pass http://bathudi_api:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Static/Media files to the backend (or serve directly if shared volume)
    location /static/ {
        proxy_pass http://bathudi_api:8000/static/;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://bathudi_api:8000/media/;
        proxy_set_header Host $host;
    }

    location /pdfs/ {
        proxy_pass http://bathudi_api:8000/pdfs/;
        proxy_set_header Host $host;
    }

    location /modules/ {
        proxy_pass http://bathudi_api:8000/modules/;
        proxy_set_header Host $host;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
