server {
    listen 80;
    server_name bathudi.co.za www.bathudi.co.za;

    # Redirect all HTTP traffic to HTTPS (once DSL is setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-running requests (like PDF generation)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Optional: Max upload size for media uploads
    client_max_body_size 100M;
}
